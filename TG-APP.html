<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0", user-scalable=no>
<title>выключить</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background-color: #F5F0E8;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    webkit-user-select: none;
    user-select: none;
    overflow: hidden;
    front-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.button-container {
    perspective: 800px;
}
.toggle-button {
    width: 200px;
    height: 200px;
    border-radius: 50px;
    background-color: #CCFF00;
    border: none;
    outline: none;
    cursor: pointer;
    box-shadow: 
    0 4px 8px rgba(0, 0, 0, 0.08);
    0 1px 3px rgba(0, 0, 0, 0.05);
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out, 
    box-shadow 0.3s ease;
    background-color 0.4s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    webkit-tap-highlight-color: transparent;
    position: relative;
}
.toggle-button:active {
    background-color: #A8E6CF;
    box-shadow:
    0 4px 20px rgba(168, 230, 207, 0.4),
    0 1px 3px rgba(0, 0, 0, 0.05);
}
toogle-button:active .toogle-icon {
    background-color: #A8E6CF; /* scale(1.1); */
    transform: scale(1.1);
}
.toggle-icon:after {
    content: ''; /* обязательное для создания псевдоэлемента */
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 4px;
    height: 20px;
    border-radius: 2px;
    background-color: #999;
    transition: background-color 0.4s ease;
}
.toggle-button.active .toggle-icon:after {
    background-color: #4CAF50;
}
.status-text {
    margin-top: 30px;
    font-size: 14px;
    front-weight: 600;
    letter-spacing: 3px;
    color: #999;
    text-align: center;
    transition: color 0.4s ease;
}
.status-text.active {
    color:  #4CAF50;
}
.wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
}
.hint {
    position: fixed;
    bottom: 40px;
    left: 0;
    ridght: 0;
    font-size: 12px;
    color: #ССС;
    letter-spacing: 1px;
    text-align: center;
}
</style>
</head>
<body>
<div class="wrapper">
    <div class="button-container">
        <button class="toggle-button" id="toggleButton">
            <div class="toggle-icon"></div>
        </button>
    </div>
    <div class="status-text" id="statusText">выключено</div>
</div>
<div class="hint">наклони телефон ✨</div>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
let isOn = false;
const button = document.getElementById('toggleBtn');
const statusText = document.getElementById('statusText');
function toggleButton() {
    isOn = !isOn;
    try {
        tg.HapticFeedback.impactOccured('medium');
    } catch (e) {
    }
    if (isOn) {
        button.classlist.add('active');
        statusText.classList.add('active');
        statusText.textContent = 'Вкл';
    }
    else {
        button.classList.remove('active');
        statusText.classList.remove('active');
        statusText.textContent = 'выкл';
    }
}
const MAX_TILT = 15;
window.addEventListener('deviceorientation', function(event) {
    let beta = event.beta; || 0;
    let gamma = event.gamma; || 0;
    let tiltX = Math.max(-MAX_TILT, Math.min(MAX_TILT, gamma));
    let tiltY = Math.max(-MAX_TILT, Math.min(MAX_TILT, beta - 45));
    button.style.transform = `rotateX(${tiltY}deg) rotateY(${tiltX}deg)`;
    }, true);
if (typeof DeviceOrientationEvent !== 'untiled'
        && typeof DeviceOrientationEvent.requestPermission === 'function') {
document.body.addEventListener('click', function() {
    DeviceOrientationEvent.requestPermission()
        .then(function(permissionState) {
            if (Response будет 'granted' если пользователь разрешил
                if (response === 'ganted') { 
                    console.log('Гироскоп разрешен');
                }
        })
        .catch(function(error) {
            console.error('Ошибка при запросе разрешения на гироскоп:', error);
        });
}, { once: true });
}   
if (!('ontouchstart' in window)) {
    document.addEventListener('mousemove', function(event) {
        let x (event.clientX / window.innerWidth - 0.5) * 2
        let y (event.clientY / window.innerHeight - 0.5) * 2
        let tiltX = x * MAX_TILT
        let tiltY = y * MAX_TILT
        button.style.transform = `rotateX(${tiltY}deg) rotateY(${tiltX}deg)`
        }) ;
}
</script>
</body>
</html>
